<div class="threats-page">
  <app-threat-table (ipSelected)="openDrawer($event)" [selectedIp]="selectedIp()" />

  <div class="drawer-backdrop" [class.active]="selectedIp()" (click)="closeDrawer()"></div>
  <div class="drawer-overlay" [class.open]="selectedIp()" [style.width.px]="drawerWidth()">
    <div class="resize-handle" (mousedown)="startResize($event)">
      <div class="handle-bar"></div>
    </div>
    <app-threat-detail-drawer [ip]="selectedIp()" (closed)="closeDrawer()" (ipChange)="openDrawer($event)" />
  </div>
</div>
