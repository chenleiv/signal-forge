<div class="settings-page">

    <div class="page-header">
        <h1 class="page-title">Settings</h1>
        <p class="page-sub">Configure analyst profile, connection parameters, and alert thresholds.</p>
    </div>

    <div class="sections">

        <!-- User Profile -->
        <section class="card">
            <div class="card-header">
                <svg class="card-icon" viewBox="0 0 16 16" fill="none">
                    <circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.2" />
                    <path d="M2 14c0-3.314 2.686-5 6-5s6 1.686 6 5" stroke="currentColor" stroke-width="1.2"
                        stroke-linecap="round" />
                </svg>
                <h2 class="card-title">User Profile</h2>
            </div>
            <div class="field-grid">
                <div class="field">
                    <label>Analyst Name</label>
                    <input [value]="form().analystName"
                        (input)="form.update(s => ({...s, analystName: $any($event.target).value}))"
                        placeholder="SOC Analyst" />
                </div>
                <div class="field">
                    <label>Role</label>
                    <input [value]="form().analystRole"
                        (input)="form.update(s => ({...s, analystRole: $any($event.target).value}))"
                        placeholder="Tier 1" />
                </div>
            </div>
        </section>

        <!-- Appearance -->
        <section class="card">
            <div class="card-header">
                <svg class="card-icon" viewBox="0 0 16 16" fill="none">
                    <circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.2"/>
                    <path d="M8 2.5v1M8 12.5v1M2.5 8h1M12.5 8h1M4.4 4.4l.7.7M10.9 10.9l.7.7M4.4 11.6l.7-.7M10.9 5.1l.7-.7"
                        stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                </svg>
                <h2 class="card-title">Appearance</h2>
            </div>
            <div class="field-grid">
                <div class="field full">
                    <label>Theme</label>
                    <div class="theme-toggle">
                        <button class="theme-btn"
                            [class.active]="themeService.theme() === 'dark'"
                            (click)="themeService.theme() !== 'dark' && themeService.toggle()">
                            🌙 Dark
                        </button>
                        <button class="theme-btn"
                            [class.active]="themeService.theme() === 'light'"
                            (click)="themeService.theme() !== 'light' && themeService.toggle()">
                            ☀️ Light
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Connection -->
        <section class="card">
            <div class="card-header">
                <svg class="card-icon" viewBox="0 0 16 16" fill="none">
                    <circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.2" />
                    <path d="M4.5 11.5a5 5 0 0 1 0-7M11.5 4.5a5 5 0 0 1 0 7" stroke="currentColor" stroke-width="1.2"
                        stroke-linecap="round" />
                    <path d="M2 13.5a8 8 0 0 1 0-11M14 2.5a8 8 0 0 1 0 11" stroke="currentColor" stroke-width="1.2"
                        stroke-linecap="round" />
                </svg>
                <h2 class="card-title">Connection</h2>
            </div>
            <div class="field-grid">
                <div class="field full">
                    <label>WebSocket URL</label>
                    <input [value]="form().wsUrl"
                        (input)="form.update(s => ({...s, wsUrl: $any($event.target).value}))"
                        placeholder="ws://127.0.0.1:8000/ws/threats" />
                </div>
                <div class="field">
                    <label>Reconnect Delay (sec)</label>
                    <input type="number" [value]="form().reconnectDelay"
                        (input)="form.update(s => ({...s, reconnectDelay: +$any($event.target).value}))"
                        min="1" max="30" />
                </div>
                <div class="field">
                    <label>Event Buffer Size</label>
                    <input type="number" [value]="form().bufferSize"
                        (input)="form.update(s => ({...s, bufferSize: +$any($event.target).value}))"
                        min="10" max="500" />
                </div>
            </div>
        </section>

        <!-- Alert Thresholds -->
        <section class="card">
            <div class="card-header">
                <svg class="card-icon" viewBox="0 0 16 16" fill="none">
                    <path d="M8 2l5.5 10H2.5L8 2z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round" />
                    <path d="M8 7v2.5M8 11v.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
                </svg>
                <h2 class="card-title">Alert Thresholds</h2>
                <span class="card-sub">Minimum score to classify an event at each severity level.</span>
            </div>
            <div class="threshold-grid">
                <div class="threshold-field">
                    <div class="threshold-label">
                        <span class="sev-dot critical"></span>
                        <label class="label-critical">Critical</label>
                        <span class="threshold-op">≥</span>
                    </div>
                    <input type="number" [value]="form().criticalThreshold"
                        (input)="form.update(s => ({...s, criticalThreshold: +$any($event.target).value}))"
                        min="1" max="100" />
                </div>
                <div class="threshold-field">
                    <div class="threshold-label">
                        <span class="sev-dot high"></span>
                        <label class="label-high">High</label>
                        <span class="threshold-op">≥</span>
                    </div>
                    <input type="number" [value]="form().highThreshold"
                        (input)="form.update(s => ({...s, highThreshold: +$any($event.target).value}))"
                        min="1" max="100" />
                </div>
                <div class="threshold-field">
                    <div class="threshold-label">
                        <span class="sev-dot medium"></span>
                        <label class="label-medium">Medium</label>
                        <span class="threshold-op">≥</span>
                    </div>
                    <input type="number" [value]="form().mediumThreshold"
                        (input)="form.update(s => ({...s, mediumThreshold: +$any($event.target).value}))"
                        min="1" max="100" />
                </div>
            </div>
        </section>

    </div>

    <!-- Actions -->
    <div class="actions">
        <button class="btn-logout" (click)="logout()">Logout</button>
        <button class="btn-reset" (click)="reset()">Reset to Defaults</button>
        <button class="btn-save" [class.saved]="saved()" (click)="save()">
            {{ saved() ? '✓ Saved' : 'Save Settings' }}
        </button>
    </div>

</div>
