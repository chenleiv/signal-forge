<div class="login-page">

  <div class="login-card">

    <!-- Logo -->
    <div class="login-logo">
      <div class="logo-ring">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L3 7v10l9 5 9-5V7L12 2z" stroke="#3b82f6" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M12 7l4 2.5v5L12 17l-4-2.5v-5L12 7z" fill="#3b82f6" opacity="0.5"/>
        </svg>
      </div>
      <div class="logo-text">
        <span class="logo-name">SignalForge</span>
        <span class="logo-sub">Threat Operations</span>
      </div>
    </div>

    <div class="login-divider"></div>

    <!-- Heading -->
    <div class="login-heading">
      <h1 class="login-title">Sign In</h1>
      <p class="login-sub">Access the SOC control panel</p>
    </div>

    <!-- Form -->
    <form class="login-form" (ngSubmit)="submit()">

      <div class="field">
        <label class="field-label">Username</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
          <input class="field-input" type="text" [value]="username()"
            (input)="username.set($any($event.target).value)"
            placeholder="analyst" autocomplete="off"/>
        </div>
      </div>

      <div class="field">
        <label class="field-label">Password</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input class="field-input" type="password" [value]="password()"
            (input)="password.set($any($event.target).value)"
            placeholder="••••••••" autocomplete="off"/>
        </div>
      </div>

      @if (error()) {
        <div class="login-error">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          {{ error() }}
        </div>
      }

      <button class="login-btn" type="submit" [disabled]="loading()">
        @if (loading()) {
          <span class="btn-spinner"></span> Authenticating…
        } @else {
          Sign In
        }
      </button>

    </form>

    <button class="demo-btn" type="button" (click)="demoLogin()">
      ▶ Try Demo  <span class="demo-hint">analyst / threatwatcher</span>
    </button>

  </div>

</div>
