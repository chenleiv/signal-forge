<div class="layout">

  <!-- ── Sidebar ──────────────────────────────────────────── -->
  <aside class="sidebar">

    <div class="logo">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L3 7v10l9 5 9-5V7L12 2z" stroke="#fa582d" stroke-width="1.5" stroke-linejoin="round" />
          <path d="M12 7l4 2.5v5L12 17l-4-2.5v-5L12 7z" fill="#fa582d" opacity="0.4" />
        </svg>
      </div>
      <div class="logo-text">
        <span class="logo-name">SignalForge</span>
        <span class="logo-sub">Threat Operations</span>
      </div>
    </div>

    <div class="nav-section">
      <span class="nav-label">OPERATIONS</span>
      <nav class="menu">
        <a class="item" routerLink="/dashboard" routerLinkActive="active">
          <svg class="item-icon" viewBox="0 0 16 16" fill="none">
            <rect x="1" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.2" />
            <rect x="9" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.2" />
            <rect x="1" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.2" />
            <rect x="9" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.2" />
          </svg>
          Dashboard
        </a>
        <a class="item" routerLink="/threats" routerLinkActive="active">
          <svg class="item-icon" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.2" />
            <path d="M8 5v4M8 11v.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
          </svg>
          Threat Intelligence
        </a>
        <a class="item" routerLink="/alerts" routerLinkActive="active">
          <svg class="item-icon" viewBox="0 0 16 16" fill="none">
            <path d="M8 2l5.5 10H2.5L8 2z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round" />
            <path d="M8 7v2.5M8 11v.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
          </svg>
          Alerts
        </a>
        <a class="item" routerLink="/incidents" routerLinkActive="active">
          <svg class="item-icon" viewBox="0 0 16 16" fill="none">
            <rect x="2" y="3" width="12" height="10" rx="1.5" stroke="currentColor" stroke-width="1.2" />
            <path d="M5 7h6M5 9.5h4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" />
          </svg>
          Incidents
        </a>
        <a class="item" routerLink="/map" routerLinkActive="active">
          <svg class="item-icon" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.2" />
            <path d="M2 8h12M8 2c-2 2-2 8 0 12M8 2c2 2 2 8 0 12" stroke="currentColor" stroke-width="1.2" />
          </svg>
          Threat Map
        </a>
      </nav>
    </div>

    <div class="nav-section">
      <span class="nav-label">SYSTEM</span>
      <nav class="menu">
        <a class="item" routerLink="/settings" routerLinkActive="active">
          <svg class="item-icon" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.2" />
            <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.2 3.2l1.4 1.4M11.4 11.4l1.4 1.4M3.2 12.8l1.4-1.4M11.4 4.6l1.4-1.4"
              stroke="currentColor" stroke-width="1.2" stroke-linecap="round" />
          </svg>
          Settings
        </a>
      </nav>
    </div>

    <div class="sidebar-footer">
      <div class="user-row">
        <div class="user-avatar">SF</div>
        <div class="user-info">
          <span class="user-name">SOC Analyst</span>
          <span class="user-status">
            <span class="status-dot"></span>Active
          </span>
        </div>
      </div>
    </div>

  </aside>

  <!-- ── Main ─────────────────────────────────────────────── -->
  <div class="main">

    <header class="topbar">
      <div class="topbar-left">
        <span class="topbar-section">Dashboards &amp; Reports</span>
        <span class="topbar-page">{{ pageTitle() }}</span>
        <span class="topbar-page">Live Operations</span>
      </div>
      <div class="topbar-right">
        <div class="topbar-chip">
          <span class="chip-dot"></span>
          LIVE FEED
        </div>
        <span class="topbar-time">{{ time() }}</span>
        <div class="topbar-notif">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <path d="M8 2a5 5 0 0 1 5 5v3l1.5 1.5H1.5L3 10V7a5 5 0 0 1 5-5z" stroke="#9ca3af" stroke-width="1.2" />
            <path d="M6.5 13a1.5 1.5 0 0 0 3 0" stroke="#9ca3af" stroke-width="1.2" />
          </svg>
          <span class="notif-badge">3</span>
        </div>
      </div>
    </header>

    <section class="content">
      <router-outlet></router-outlet>
    </section>

  </div>
</div>
